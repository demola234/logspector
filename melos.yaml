name: logspector

packages:
  - packages/**
  - overlay
  - exporters
  - examples/**

command:
  bootstrap:
    runPubGetInParallel: true

scripts:
  analyze:
    run: melos exec -- dart analyze
  test:
    run: melos exec --dir-exists=test -- flutter test
  format:
    run: melos exec -- dart format .
